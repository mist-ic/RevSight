name: Deploy to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Force deploy backend'
        type: boolean
        default: false
      deploy_frontend:
        description: 'Force deploy frontend'
        type: boolean
        default: false

env:
  REGION: asia-south1
  REPO: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/revsight
  BACKEND_SERVICE: revsight-backend
  FRONTEND_SERVICE: revsight-frontend

jobs:
  # ── Detect which paths changed ─────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ── Deploy backend (only when backend/ changes) ────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event.inputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.REPO }}/backend:${{ github.sha }} \
            -t ${{ env.REPO }}/backend:latest \
            -f backend/Dockerfile \
            backend/

      - name: Push backend image
        run: docker push --all-tags ${{ env.REPO }}/backend

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=${{ env.REPO }}/backend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --concurrency=10 \
            --set-secrets=GEMINI_API_KEY=gemini-api-key:latest,DATABASE_URL=database-url:latest \
            --set-env-vars=LANGCHAIN_TRACING_V2=false,ENVIRONMENT=production,REQUIRE_APPROVAL=false \
            --quiet

      - name: Print backend URL
        run: |
          echo "Backend: $(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region=${{ env.REGION }} --format='value(status.url)')"

  # ── Deploy frontend (only when frontend/ changes) ──────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event.inputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Always fetch backend URL from existing service (no dependency on backend job)
      - name: Get backend URL
        id: backend_url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend_url.outputs.url }} \
            -t ${{ env.REPO }}/frontend:${{ github.sha }} \
            -t ${{ env.REPO }}/frontend:latest \
            -f frontend/Dockerfile \
            frontend/

      - name: Push frontend image
        run: docker push --all-tags ${{ env.REPO }}/frontend

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image=${{ env.REPO }}/frontend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --concurrency=80 \
            --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_API_URL=${{ steps.backend_url.outputs.url }} \
            --quiet

      - name: Print frontend URL
        run: |
          echo "Frontend: $(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region=${{ env.REGION }} --format='value(status.url)')"
