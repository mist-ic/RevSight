substitutions:
  _REGION: asia-south1
  _REPO: asia-south1-docker.pkg.dev/revsight-492123/revsight
  _BACKEND_SERVICE: revsight-backend
  _FRONTEND_SERVICE: revsight-frontend

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Build backend image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REPO}/backend:$SHORT_SHA
      - -t
      - ${_REPO}/backend:latest
      - -f
      - backend/Dockerfile
      - backend/
    waitFor: ["-"]

  # ── 2. Push backend image ───────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args:
      - push
      - --all-tags
      - ${_REPO}/backend
    waitFor: [build-backend]

  # ── 3. Deploy backend to Cloud Run ─────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=2
      - --memory=512Mi
      - --cpu=1
      - --timeout=300
      - --concurrency=10
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest,DATABASE_URL=database-url:latest
      - --set-env-vars=LANGCHAIN_TRACING_V2=false,ENVIRONMENT=production,REQUIRE_APPROVAL=false
      - --quiet
    waitFor: [push-backend]

  # ── 4. Get backend URL ──────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: get-backend-url
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "Backend URL: $$URL"
        echo "$$URL" > /workspace/backend_url.txt
    waitFor: [deploy-backend]

  # ── 5. Build frontend image (injects backend URL) ───────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL \
          -t ${_REPO}/frontend:$SHORT_SHA \
          -t ${_REPO}/frontend:latest \
          -f frontend/Dockerfile \
          frontend/
    waitFor: [get-backend-url]

  # ── 6. Push frontend image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args:
      - push
      - --all-tags
      - ${_REPO}/frontend
    waitFor: [build-frontend]

  # ── 7. Deploy frontend to Cloud Run ─────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy ${_FRONTEND_SERVICE} \
          --image=${_REPO}/frontend:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 \
          --max-instances=2 \
          --memory=512Mi \
          --cpu=1 \
          --timeout=60 \
          --concurrency=80 \
          --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_API_URL=$$BACKEND_URL \
          --quiet
    waitFor: [push-frontend]

  # ── 8. Print deployed URLs ──────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: print-urls
    entrypoint: bash
    args:
      - -c
      - |
        echo "=== DEPLOYED ==="
        echo "Backend:  $(gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format='value(status.url)')"
        echo "Frontend: $(gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format='value(status.url)')"
    waitFor: [deploy-frontend]

images:
  - ${_REPO}/backend:$SHORT_SHA
  - ${_REPO}/backend:latest
  - ${_REPO}/frontend:$SHORT_SHA
  - ${_REPO}/frontend:latest
